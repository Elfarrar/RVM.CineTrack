name: Deploy Development

on:
  workflow_dispatch:
  push:
    branches: [dev]

concurrency:
  group: rvm-cinetrack-deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/rvmtech/cinetrack
            git pull origin dev
            export POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            export API_KEY=${{ secrets.API_KEY }}
            export TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            docker compose -f docker-compose.prod.yml up -d --build
            sleep 10
            curl -f http://localhost:5090/cinetrack/health || exit 1

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            curl -f https://infra-dev.rvmxtech.com/cinetrack/health || exit 1
