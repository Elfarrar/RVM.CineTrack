name: Deploy Production (Lab)

on:
  workflow_dispatch:

concurrency:
  group: rvm-cinetrack-deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to lab server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/rvmtech/cinetrack
            git pull origin master
            export POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            export API_KEY=${{ secrets.API_KEY }}
            export TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            docker compose -f docker-compose.prod.yml up -d --build
            sleep 10
            curl -f http://localhost:5090/cinetrack/health || exit 1

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            curl -f https://infra.rvmxtech.com/cinetrack/health || exit 1
